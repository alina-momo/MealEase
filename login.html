<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MealEase</title>

    <link rel="icon" href="assets/tab_logo.png" type="image/svg+xml">
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body>

    <header class="site-header">
        <nav class="navbar">

            <a class="logo-wrap" href="index.html">
                <img src="assets/logo.svg" alt="MealEase">
            </a>

            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="subscription.html">Subscriptions</a>
                <a href="ready-to-cook.html">Ready-to-Cook</a>
                <a href="offers.html">Offers</a>
                <a href="about.html">About</a>
            </div>

            <div class="nav-actions">
                
                <a href="checkout.html" class="cart-pill">
                    <span class="label">Package</span>
                    🛒
                    <span class="cart-count" data-cart-count>0</span>
                </a>

              <button class="mobile-toggle" data-mobile-toggle aria-label="Open menu">☰</button>
            </div>

        </nav>
    </header>

    <main>

        <section class="section auth-section">

            <div class="container">

                <div class="form-card auth-card">

                    <img src="assets/logo.svg" alt="MealEase" style="width:250px;display:block;margin:0 auto 25px;">

                    <div class="section-head-login compact-head">


                        <h2 class="section-title-login">
                            Login
                        </h2>

                    </div>
                    

                    <form id="loginForm">

                        <div class="form-group">
                            <label>Email Address</label>

                            <input type="email" id="loginEmail" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label>Password</label>

                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>


                        <div class="section-head-password">
                        <label class="remember-row">

                            <input type="checkbox" id="showPassword">

                            Show Password

                        </label>

                        <label class="remember-row">

                            <input type="checkbox" id="rememberMe">

                            Remember Me

                        </label>
                        </div>

                        <p id="loginMessage" style="color:#d62828;font-weight:600;margin:10px 0;">
                        </p>

                        <button class="btn btn-primary btn-wide" type="submit" style="font-size: large;">

                            Login

                        </button>

                        <div class="login-links">

                            <a href="#">
                                Forgot Password?
                            </a>

                            <a href="signup.html">
                                Create an Account
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </section>

    </main>

    <footer class="footer">

        <div class="footer-bottom">

            © 2026 MealEase | Developed by Alina Momo

        </div>

    </footer>

    <div class="toast"></div>

    <script>

        const password = document.getElementById("loginPassword");

        document
            .getElementById("showPassword")
            .addEventListener("change", function () {

                password.type = this.checked ? "text" : "password";

            });

    </script>

    <script src="assets/app.js"></script>

</body>

</html>
